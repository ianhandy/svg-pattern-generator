<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinite Tiling Pattern Studio</title>
<style>
  :root {
    --bg-dark: #1A0D00;
    --bg: #241200;
    --bg-light: #2E1800;
    --bg-panel: #1E0F00;
    --gold: #DDC165;
    --gold-light: #FFE9A3;
    --orange: #E5591C;
    --orange-glow: #E5591C88;
    --text: #DDC165;
    --text-dim: #9A8544;
    --text-bright: #FFE9A3;
    --border: #3A2200;
    --border-active: #DDC16566;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-dark);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--gold);
    text-transform: uppercase;
  }

  header h1 span {
    color: var(--orange);
  }

  .header-actions {
    display: flex;
    gap: 8px;
  }

  .btn {
    background: var(--bg-light);
    color: var(--gold);
    border: 1px solid var(--border);
    padding: 6px 14px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .btn:hover {
    border-color: var(--gold);
    background: var(--bg);
    box-shadow: 0 0 12px var(--orange-glow);
  }

  .btn-primary {
    background: var(--orange);
    color: #fff;
    border-color: var(--orange);
  }

  .btn-primary:hover {
    background: #f06a2c;
    box-shadow: 0 0 16px var(--orange-glow);
  }

  /* Main layout */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 300px;
    min-width: 300px;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
  }

  .sidebar::-webkit-scrollbar { width: 6px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .sidebar::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  .panel-section {
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
  }

  .panel-section h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  /* Pattern type selector */
  .pattern-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }

  .pattern-btn {
    aspect-ratio: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: all 0.2s;
    padding: 4px;
  }

  .pattern-btn:hover {
    border-color: var(--gold);
    box-shadow: 0 0 8px var(--orange-glow);
  }

  .pattern-btn.active {
    border-color: var(--orange);
    background: #2E180044;
    box-shadow: 0 0 12px var(--orange-glow);
  }

  .pattern-btn svg {
    width: 32px;
    height: 32px;
  }

  .pattern-btn span {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  .pattern-btn.active span {
    color: var(--gold);
  }

  /* Controls */
  .control-group {
    margin-bottom: 12px;
  }

  .control-group:last-child {
    margin-bottom: 0;
  }

  .control-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }

  .control-label label {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  .control-label .value {
    font-size: 11px;
    color: var(--gold);
    font-variant-numeric: tabular-nums;
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--orange);
    cursor: pointer;
    box-shadow: 0 0 6px var(--orange-glow);
    transition: box-shadow 0.2s;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    box-shadow: 0 0 12px var(--orange-glow);
  }

  /* Color inputs */
  .color-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }

  .color-row:last-child { margin-bottom: 0; }

  .color-swatch {
    width: 28px;
    height: 28px;
    border-radius: 4px;
    border: 1px solid var(--border);
    cursor: pointer;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }

  .color-swatch input[type="color"] {
    position: absolute;
    width: 150%;
    height: 150%;
    top: -25%;
    left: -25%;
    cursor: pointer;
    border: none;
    padding: 0;
  }

  .color-row label {
    font-size: 11px;
    color: var(--text-dim);
    flex: 1;
  }

  .color-row .hex {
    font-size: 11px;
    color: var(--gold);
    font-variant-numeric: tabular-nums;
  }

  /* Preset buttons */
  .preset-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .preset-chip {
    font-size: 10px;
    padding: 4px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }

  .preset-chip:hover {
    border-color: var(--gold);
    color: var(--gold);
  }

  .preset-chip.active {
    border-color: var(--orange);
    color: var(--orange);
    background: #E5591C11;
  }

  /* Canvas area */
  .canvas-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    background: var(--bg-dark);
  }

  .canvas-area canvas {
    image-rendering: auto;
  }

  /* Preview overlay info */
  .canvas-info {
    position: absolute;
    bottom: 12px;
    left: 12px;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--bg-panel);
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    pointer-events: none;
  }

  /* Toggle for tile boundary */
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }

  .toggle-row:last-child { margin-bottom: 0; }

  .toggle {
    width: 32px;
    height: 18px;
    background: var(--border);
    border-radius: 9px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .toggle.on {
    background: var(--orange);
  }

  .toggle::after {
    content: '';
    position: absolute;
    width: 14px;
    height: 14px;
    background: var(--gold-light);
    border-radius: 50%;
    top: 2px;
    left: 2px;
    transition: transform 0.2s;
  }

  .toggle.on::after {
    transform: translateX(14px);
  }

  .toggle-row label {
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
  }

  /* Export modal */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    min-width: 420px;
    max-width: 600px;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .modal h2 {
    font-size: 14px;
    color: var(--gold);
    margin-bottom: 16px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .modal textarea {
    width: 100%;
    height: 200px;
    background: var(--bg-dark);
    color: var(--gold-light);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px;
    font-family: inherit;
    font-size: 12px;
    resize: vertical;
    margin-bottom: 12px;
  }

  .modal textarea:focus {
    outline: none;
    border-color: var(--gold);
  }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  /* Randomize button */
  .btn-random {
    background: transparent;
    border: 1px dashed var(--border);
    color: var(--text-dim);
    font-size: 11px;
    padding: 6px 12px;
    cursor: pointer;
    font-family: inherit;
    border-radius: 4px;
    transition: all 0.3s;
    width: 100%;
    letter-spacing: 1px;
  }

  .btn-random:hover {
    border-color: var(--orange);
    color: var(--orange);
    box-shadow: 0 0 12px var(--orange-glow);
  }

  /* Animations */
  @keyframes glow-pulse {
    0%, 100% { box-shadow: 0 0 8px var(--orange-glow); }
    50% { box-shadow: 0 0 20px var(--orange-glow); }
  }

  .glow-animate {
    animation: glow-pulse 2s ease-in-out infinite;
  }

  /* Select styling */
  select {
    width: 100%;
    background: var(--bg);
    color: var(--gold);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 8px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    outline: none;
  }

  select:focus { border-color: var(--gold); }
  select option { background: var(--bg-dark); color: var(--gold); }
</style>
</head>
<body>

<header>
  <h1><span>&#9670;</span> Infinite Tiling <span>Pattern Studio</span></h1>
  <div class="header-actions">
    <button class="btn" onclick="exportSVG()">Export SVG</button>
    <button class="btn" onclick="exportCSS()">Copy CSS</button>
    <button class="btn btn-primary" onclick="exportPNG()">Download PNG</button>
  </div>
</header>

<div class="main">
  <div class="sidebar">

    <!-- Pattern Type -->
    <div class="panel-section">
      <h3>Pattern Type</h3>
      <div class="pattern-grid" id="patternGrid"></div>
    </div>

    <!-- Geometry -->
    <div class="panel-section">
      <h3>Geometry</h3>

      <div class="control-group">
        <div class="control-label">
          <label>Scale</label>
          <span class="value" id="scaleVal">40</span>
        </div>
        <input type="range" id="scale" min="10" max="120" value="40" step="1">
      </div>

      <div class="control-group">
        <div class="control-label">
          <label>Density</label>
          <span class="value" id="densityVal">1.0</span>
        </div>
        <input type="range" id="density" min="0.2" max="3" value="1" step="0.1">
      </div>

      <div class="control-group">
        <div class="control-label">
          <label>Stroke Width</label>
          <span class="value" id="strokeVal">1.5</span>
        </div>
        <input type="range" id="strokeWidth" min="0.2" max="6" value="1.5" step="0.1">
      </div>

      <div class="control-group">
        <div class="control-label">
          <label>Rotation</label>
          <span class="value" id="rotationVal">0°</span>
        </div>
        <input type="range" id="rotation" min="0" max="360" value="0" step="1">
      </div>

      <div class="control-group">
        <div class="control-label">
          <label>Complexity</label>
          <span class="value" id="complexityVal">3</span>
        </div>
        <input type="range" id="complexity" min="1" max="8" value="3" step="1">
      </div>
    </div>

    <!-- Style -->
    <div class="panel-section">
      <h3>Style</h3>

      <div class="control-group">
        <div class="control-label"><label>Fill Mode</label></div>
        <select id="fillMode">
          <option value="stroke">Stroke Only</option>
          <option value="fill">Fill Only</option>
          <option value="both">Stroke + Fill</option>
        </select>
      </div>

      <div class="control-group" style="margin-top:10px">
        <div class="control-label">
          <label>Opacity</label>
          <span class="value" id="opacityVal">1.0</span>
        </div>
        <input type="range" id="opacity" min="0.1" max="1" value="1" step="0.05">
      </div>
    </div>

    <!-- Colors -->
    <div class="panel-section">
      <h3>Colors</h3>

      <div class="color-row">
        <div class="color-swatch"><input type="color" id="bgColor" value="#1A0D00"></div>
        <label>Background</label>
        <span class="hex" id="bgHex">#1A0D00</span>
      </div>

      <div class="color-row">
        <div class="color-swatch"><input type="color" id="strokeColor" value="#DDC165"></div>
        <label>Stroke</label>
        <span class="hex" id="strokeHex">#DDC165</span>
      </div>

      <div class="color-row">
        <div class="color-swatch"><input type="color" id="fillColor" value="#E5591C"></div>
        <label>Fill</label>
        <span class="hex" id="fillHex">#E5591C</span>
      </div>

      <div class="color-row">
        <div class="color-swatch"><input type="color" id="accentColor" value="#FFE9A3"></div>
        <label>Accent</label>
        <span class="hex" id="accentHex">#FFE9A3</span>
      </div>

      <div style="margin-top: 10px;">
        <div class="control-label"><label>Palette Presets</label></div>
        <div class="preset-row">
          <button class="preset-chip active" onclick="applyPalette('funforrest')">FunForrest</button>
          <button class="preset-chip" onclick="applyPalette('midnight')">Midnight</button>
          <button class="preset-chip" onclick="applyPalette('ember')">Ember</button>
          <button class="preset-chip" onclick="applyPalette('arctic')">Arctic</button>
          <button class="preset-chip" onclick="applyPalette('neon')">Neon</button>
          <button class="preset-chip" onclick="applyPalette('forest')">Forest</button>
        </div>
      </div>
    </div>

    <!-- Display -->
    <div class="panel-section">
      <h3>Display</h3>
      <div class="toggle-row">
        <div class="toggle on" id="toggleTile" onclick="toggleOption('showTile')"></div>
        <label onclick="toggleOption('showTile')">Show tile boundary</label>
      </div>
      <div class="toggle-row">
        <div class="toggle" id="toggleAnimate" onclick="toggleOption('animate')"></div>
        <label onclick="toggleOption('animate')">Animate rotation</label>
      </div>
    </div>

    <!-- Randomize -->
    <div class="panel-section">
      <button class="btn-random" onclick="randomize()">&#9881; RANDOMIZE EVERYTHING</button>
    </div>

  </div>

  <div class="canvas-area" id="canvasArea">
    <canvas id="canvas"></canvas>
    <div class="canvas-info" id="canvasInfo">Tile: 40×40 | Hexagon Grid</div>
  </div>
</div>

<!-- Export Modal -->
<div class="modal-overlay" id="exportModal">
  <div class="modal">
    <h2 id="modalTitle">Export SVG</h2>
    <textarea id="exportCode" readonly></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Close</button>
      <button class="btn btn-primary" onclick="copyExport()">Copy to Clipboard</button>
    </div>
  </div>
</div>

<script>
// ============ PATTERN TYPES ============
const PATTERN_TYPES = [
  { id: 'hexagon',    name: 'Hexagon',   icon: 'hex' },
  { id: 'diamond',    name: 'Diamond',   icon: 'diamond' },
  { id: 'triangle',   name: 'Triangle',  icon: 'triangle' },
  { id: 'truchet',    name: 'Truchet',   icon: 'truchet' },
  { id: 'islamic',    name: 'Islamic',   icon: 'islamic' },
  { id: 'wave',       name: 'Wave',      icon: 'wave' },
  { id: 'circles',    name: 'Circles',   icon: 'circles' },
  { id: 'chevron',    name: 'Chevron',   icon: 'chevron' },
  { id: 'crosshatch', name: 'Crosshatch', icon: 'crosshatch' },
  { id: 'voronoi',    name: 'Voronoi',   icon: 'voronoi' },
  { id: 'stars',      name: 'Stars',     icon: 'stars' },
  { id: 'maze',       name: 'Maze',      icon: 'maze' },
];

const PALETTES = {
  funforrest: { bg: '#1A0D00', stroke: '#DDC165', fill: '#E5591C', accent: '#FFE9A3' },
  midnight:   { bg: '#0A0A1A', stroke: '#4466AA', fill: '#2244CC', accent: '#88AAFF' },
  ember:      { bg: '#1A0500', stroke: '#FF6633', fill: '#CC3300', accent: '#FFAA66' },
  arctic:     { bg: '#0A1520', stroke: '#88CCEE', fill: '#336699', accent: '#BBDDFF' },
  neon:       { bg: '#0A0A0A', stroke: '#00FF88', fill: '#FF0066', accent: '#FFFF00' },
  forest:     { bg: '#0A1A0A', stroke: '#66AA44', fill: '#338822', accent: '#AADD66' },
};

// ============ STATE ============
const state = {
  patternType: 'hexagon',
  scale: 40,
  density: 1.0,
  strokeWidth: 1.5,
  rotation: 0,
  complexity: 3,
  fillMode: 'stroke',
  opacity: 1.0,
  bgColor: '#1A0D00',
  strokeColor: '#DDC165',
  fillColor: '#E5591C',
  accentColor: '#FFE9A3',
  showTile: true,
  animate: false,
  seed: Math.random() * 99999 | 0,
};

let canvas, ctx;
let animFrame = null;
let animAngle = 0;

// ============ INIT ============
function init() {
  canvas = document.getElementById('canvas');
  ctx = canvas.getContext('2d');
  buildPatternGrid();
  bindControls();
  resize();
  window.addEventListener('resize', resize);
  render();
}

function resize() {
  const area = document.getElementById('canvasArea');
  canvas.width = area.clientWidth;
  canvas.height = area.clientHeight;
  render();
}

// ============ PATTERN GRID ============
function buildPatternGrid() {
  const grid = document.getElementById('patternGrid');
  grid.innerHTML = PATTERN_TYPES.map(p => `
    <button class="pattern-btn ${p.id === state.patternType ? 'active' : ''}"
            data-pattern="${p.id}" onclick="selectPattern('${p.id}')">
      ${getPatternIcon(p.icon)}
      <span>${p.name}</span>
    </button>
  `).join('');
}

function getPatternIcon(icon) {
  const s = 32;
  const c = '#DDC165';
  const icons = {
    hex: `<svg viewBox="0 0 ${s} ${s}"><polygon points="16,2 28,9 28,23 16,30 4,23 4,9" fill="none" stroke="${c}" stroke-width="1.5"/></svg>`,
    diamond: `<svg viewBox="0 0 ${s} ${s}"><polygon points="16,2 30,16 16,30 2,16" fill="none" stroke="${c}" stroke-width="1.5"/></svg>`,
    triangle: `<svg viewBox="0 0 ${s} ${s}"><polygon points="16,4 28,28 4,28" fill="none" stroke="${c}" stroke-width="1.5"/></svg>`,
    truchet: `<svg viewBox="0 0 ${s} ${s}"><path d="M0,0 Q16,16 32,0 M0,32 Q16,16 32,32" fill="none" stroke="${c}" stroke-width="1.5"/></svg>`,
    islamic: `<svg viewBox="0 0 ${s} ${s}"><polygon points="16,2 20,12 30,12 22,18 25,28 16,22 7,28 10,18 2,12 12,12" fill="none" stroke="${c}" stroke-width="1.5"/></svg>`,
    wave: `<svg viewBox="0 0 ${s} ${s}"><path d="M0,16 Q8,4 16,16 Q24,28 32,16" fill="none" stroke="${c}" stroke-width="1.5"/><path d="M0,24 Q8,12 16,24 Q24,36 32,24" fill="none" stroke="${c}" stroke-width="1"/></svg>`,
    circles: `<svg viewBox="0 0 ${s} ${s}"><circle cx="16" cy="16" r="10" fill="none" stroke="${c}" stroke-width="1.5"/><circle cx="16" cy="16" r="5" fill="none" stroke="${c}" stroke-width="1"/></svg>`,
    chevron: `<svg viewBox="0 0 ${s} ${s}"><polyline points="4,12 16,4 28,12" fill="none" stroke="${c}" stroke-width="1.5"/><polyline points="4,22 16,14 28,22" fill="none" stroke="${c}" stroke-width="1.5"/></svg>`,
    crosshatch: `<svg viewBox="0 0 ${s} ${s}"><line x1="0" y1="0" x2="32" y2="32" stroke="${c}" stroke-width="1.5"/><line x1="32" y1="0" x2="0" y2="32" stroke="${c}" stroke-width="1.5"/><line x1="16" y1="0" x2="16" y2="32" stroke="${c}" stroke-width="1"/></svg>`,
    voronoi: `<svg viewBox="0 0 ${s} ${s}"><path d="M8,2 L14,10 L6,14 L2,8 Z M18,4 L28,8 L22,18 L14,10 Z M6,14 L14,10 L16,22 L4,24 Z M22,18 L28,28 L16,30 L16,22 L14,10 Z" fill="none" stroke="${c}" stroke-width="1"/></svg>`,
    stars: `<svg viewBox="0 0 ${s} ${s}"><polygon points="16,4 18,13 28,13 20,19 23,28 16,23 9,28 12,19 4,13 14,13" fill="none" stroke="${c}" stroke-width="1.2"/></svg>`,
    maze: `<svg viewBox="0 0 ${s} ${s}"><path d="M4,4 H16 V16 H28 M4,16 H12 V28 H28 M16,16 V28" fill="none" stroke="${c}" stroke-width="1.5"/></svg>`,
  };
  return icons[icon] || icons.hex;
}

function selectPattern(id) {
  state.patternType = id;
  state.seed = Math.random() * 99999 | 0;
  document.querySelectorAll('.pattern-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.pattern === id);
  });
  render();
}

// ============ CONTROLS ============
function bindControls() {
  const sliders = ['scale', 'density', 'strokeWidth', 'rotation', 'complexity', 'opacity'];
  const valIds = ['scaleVal', 'densityVal', 'strokeVal', 'rotationVal', 'complexityVal', 'opacityVal'];
  const fmts = [v => v, v => parseFloat(v).toFixed(1), v => parseFloat(v).toFixed(1), v => v + '°', v => v, v => parseFloat(v).toFixed(2)];

  sliders.forEach((id, i) => {
    const el = document.getElementById(id);
    el.addEventListener('input', () => {
      state[id] = parseFloat(el.value);
      document.getElementById(valIds[i]).textContent = fmts[i](el.value);
      render();
    });
  });

  document.getElementById('fillMode').addEventListener('change', e => {
    state.fillMode = e.target.value;
    render();
  });

  ['bgColor', 'strokeColor', 'fillColor', 'accentColor'].forEach(id => {
    const el = document.getElementById(id);
    const hexEl = document.getElementById(id.replace('Color', 'Hex'));
    el.addEventListener('input', () => {
      state[id] = el.value;
      hexEl.textContent = el.value.toUpperCase();
      render();
    });
  });
}

function toggleOption(key) {
  state[key] = !state[key];
  const toggleEl = key === 'showTile' ? document.getElementById('toggleTile') : document.getElementById('toggleAnimate');
  toggleEl.classList.toggle('on', state[key]);
  if (key === 'animate') {
    if (state.animate) startAnimation(); else stopAnimation();
  }
  render();
}

// ============ PALETTES ============
function applyPalette(name) {
  const p = PALETTES[name];
  if (!p) return;
  state.bgColor = p.bg;
  state.strokeColor = p.stroke;
  state.fillColor = p.fill;
  state.accentColor = p.accent;

  document.getElementById('bgColor').value = p.bg;
  document.getElementById('strokeColor').value = p.stroke;
  document.getElementById('fillColor').value = p.fill;
  document.getElementById('accentColor').value = p.accent;
  document.getElementById('bgHex').textContent = p.bg.toUpperCase();
  document.getElementById('strokeHex').textContent = p.stroke.toUpperCase();
  document.getElementById('fillHex').textContent = p.fill.toUpperCase();
  document.getElementById('accentHex').textContent = p.accent.toUpperCase();

  document.querySelectorAll('.preset-chip').forEach(c => {
    c.classList.toggle('active', c.textContent.trim().toLowerCase() === name);
  });
  render();
}

// ============ RANDOMIZE ============
function randomize() {
  const types = PATTERN_TYPES.map(t => t.id);
  state.patternType = types[Math.random() * types.length | 0];
  state.scale = 15 + Math.random() * 80 | 0;
  state.density = 0.3 + Math.random() * 2.5;
  state.strokeWidth = 0.3 + Math.random() * 4;
  state.rotation = Math.random() * 360 | 0;
  state.complexity = 1 + Math.random() * 7 | 0;
  state.opacity = 0.4 + Math.random() * 0.6;
  state.fillMode = ['stroke', 'fill', 'both'][Math.random() * 3 | 0];
  state.seed = Math.random() * 99999 | 0;

  // Random palette or random colors
  if (Math.random() > 0.5) {
    const pNames = Object.keys(PALETTES);
    applyPalette(pNames[Math.random() * pNames.length | 0]);
  } else {
    const rc = () => '#' + (Math.random() * 0xFFFFFF | 0).toString(16).padStart(6, '0');
    // Dark bg
    const bg = '#' + ((Math.random() * 0x333333 | 0)).toString(16).padStart(6, '0');
    state.bgColor = bg;
    state.strokeColor = rc();
    state.fillColor = rc();
    state.accentColor = rc();
    document.getElementById('bgColor').value = bg;
    document.getElementById('strokeColor').value = state.strokeColor;
    document.getElementById('fillColor').value = state.fillColor;
    document.getElementById('accentColor').value = state.accentColor;
    document.getElementById('bgHex').textContent = bg.toUpperCase();
    document.getElementById('strokeHex').textContent = state.strokeColor.toUpperCase();
    document.getElementById('fillHex').textContent = state.fillColor.toUpperCase();
    document.getElementById('accentHex').textContent = state.accentColor.toUpperCase();
    document.querySelectorAll('.preset-chip').forEach(c => c.classList.remove('active'));
  }

  // Update UI
  document.getElementById('scale').value = state.scale;
  document.getElementById('scaleVal').textContent = state.scale;
  document.getElementById('density').value = state.density;
  document.getElementById('densityVal').textContent = state.density.toFixed(1);
  document.getElementById('strokeWidth').value = state.strokeWidth;
  document.getElementById('strokeVal').textContent = state.strokeWidth.toFixed(1);
  document.getElementById('rotation').value = state.rotation;
  document.getElementById('rotationVal').textContent = state.rotation + '°';
  document.getElementById('complexity').value = state.complexity;
  document.getElementById('complexityVal').textContent = state.complexity;
  document.getElementById('opacity').value = state.opacity;
  document.getElementById('opacityVal').textContent = state.opacity.toFixed(2);
  document.getElementById('fillMode').value = state.fillMode;

  document.querySelectorAll('.pattern-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.pattern === state.patternType);
  });

  render();
}

// ============ SEEDED RANDOM ============
function seededRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

// ============ RENDER ============
function render() {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  // Background
  ctx.fillStyle = state.bgColor;
  ctx.fillRect(0, 0, w, h);

  ctx.save();
  ctx.translate(w / 2, h / 2);
  const rot = (state.rotation + (state.animate ? animAngle : 0)) * Math.PI / 180;
  ctx.rotate(rot);
  ctx.translate(-w / 2, -h / 2);
  ctx.globalAlpha = state.opacity;

  // Draw pattern
  const drawFn = PATTERN_RENDERERS[state.patternType];
  if (drawFn) drawFn(ctx, w, h, state);

  ctx.restore();

  // Tile boundary
  if (state.showTile) {
    drawTileBoundary(ctx, w, h);
  }

  updateInfo();
}

function drawTileBoundary(ctx, w, h) {
  const s = state.scale * state.density;
  if (s < 5) return;
  const cx = w / 2, cy = h / 2;
  const tx = cx - s / 2, ty = cy - s / 2;

  ctx.save();
  ctx.strokeStyle = state.accentColor;
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.globalAlpha = 0.5;
  ctx.strokeRect(tx, ty, s, s);
  ctx.setLineDash([]);
  ctx.restore();
}

function updateInfo() {
  const s = (state.scale * state.density).toFixed(0);
  const name = PATTERN_TYPES.find(p => p.id === state.patternType)?.name || '';
  document.getElementById('canvasInfo').textContent = `Tile: ${s}×${s} | ${name}`;
}

// ============ ANIMATION ============
function startAnimation() {
  if (animFrame) return;
  function tick() {
    animAngle = (animAngle + 0.3) % 360;
    render();
    animFrame = requestAnimationFrame(tick);
  }
  animFrame = requestAnimationFrame(tick);
}

function stopAnimation() {
  if (animFrame) {
    cancelAnimationFrame(animFrame);
    animFrame = null;
  }
}

// ============ PATTERN RENDERERS ============
const PATTERN_RENDERERS = {

  hexagon(ctx, w, h, s) {
    const size = s.scale * s.density;
    const hh = size * Math.sqrt(3) / 2;
    const pad = size * 2;
    ctx.strokeStyle = s.strokeColor;
    ctx.lineWidth = s.strokeWidth;
    if (s.fillMode !== 'stroke') ctx.fillStyle = s.fillColor;

    for (let row = -pad; row < h + pad; row += hh) {
      for (let col = -pad; col < w + pad; col += size * 1.5) {
        const offset = ((row / hh | 0) % 2) * size * 0.75;
        drawHex(ctx, col + offset, row, size / 2, s);
      }
    }
  },

  diamond(ctx, w, h, s) {
    const size = s.scale * s.density;
    const pad = size * 2;
    ctx.strokeStyle = s.strokeColor;
    ctx.lineWidth = s.strokeWidth;
    if (s.fillMode !== 'stroke') ctx.fillStyle = s.fillColor;

    for (let y = -pad; y < h + pad; y += size) {
      for (let x = -pad; x < w + pad; x += size) {
        const offset = ((y / size | 0) % 2) * size / 2;
        ctx.beginPath();
        ctx.moveTo(x + offset, y - size / 2);
        ctx.lineTo(x + offset + size / 2, y);
        ctx.lineTo(x + offset, y + size / 2);
        ctx.lineTo(x + offset - size / 2, y);
        ctx.closePath();
        if (s.fillMode !== 'stroke') ctx.fill();
        if (s.fillMode !== 'fill') ctx.stroke();
      }
    }
  },

  triangle(ctx, w, h, s) {
    const size = s.scale * s.density;
    const th = size * Math.sqrt(3) / 2;
    const pad = size * 2;
    ctx.strokeStyle = s.strokeColor;
    ctx.lineWidth = s.strokeWidth;

    const rng = seededRandom(s.seed);
    for (let row = -pad; row < h + pad; row += th) {
      const rowIdx = Math.round(row / th);
      for (let col = -pad; col < w + pad; col += size / 2) {
        const colIdx = Math.round(col / (size / 2));
        const up = (rowIdx + colIdx) % 2 === 0;
        const x = col;
        const y = row;

        ctx.beginPath();
        if (up) {
          ctx.moveTo(x, y + th);
          ctx.lineTo(x + size / 2, y);
          ctx.lineTo(x + size, y + th);
        } else {
          ctx.moveTo(x, y);
          ctx.lineTo(x + size, y);
          ctx.lineTo(x + size / 2, y + th);
        }
        ctx.closePath();

        if (s.fillMode !== 'stroke') {
          ctx.fillStyle = rng() > 0.5 ? s.fillColor : s.accentColor + '44';
          ctx.fill();
        }
        if (s.fillMode !== 'fill') {
          ctx.strokeStyle = s.strokeColor;
          ctx.stroke();
        }
      }
    }
  },

  truchet(ctx, w, h, s) {
    const size = s.scale * s.density;
    const pad = size * 2;
    const rng = seededRandom(s.seed);
    ctx.strokeStyle = s.strokeColor;
    ctx.lineWidth = s.strokeWidth;
    ctx.lineCap = 'round';

    for (let y = -pad; y < h + pad; y += size) {
      for (let x = -pad; x < w + pad; x += size) {
        const variant = rng() > 0.5 ? 0 : 1;
        ctx.beginPath();
        if (variant === 0) {
          ctx.arc(x, y, size / 2, 0, Math.PI / 2);
          ctx.moveTo(x + size, y + size);
          ctx.arc(x + size, y + size, size / 2, Math.PI, Math.PI * 1.5);
        } else {
          ctx.arc(x + size, y, size / 2, Math.PI / 2, Math.PI);
          ctx.moveTo(x, y + size);
          ctx.arc(x, y + size, size / 2, -Math.PI / 2, 0);
        }
        ctx.stroke();

        // Extra complexity arcs
        if (s.complexity > 4) {
          ctx.save();
          ctx.globalAlpha = 0.3;
          ctx.strokeStyle = s.accentColor;
          ctx.lineWidth = s.strokeWidth * 0.5;
          ctx.beginPath();
          if (variant === 0) {
            ctx.arc(x, y, size / 4, 0, Math.PI / 2);
            ctx.moveTo(x + size, y + size);
            ctx.arc(x + size, y + size, size / 4, Math.PI, Math.PI * 1.5);
          } else {
            ctx.arc(x + size, y, size / 4, Math.PI / 2, Math.PI);
            ctx.moveTo(x, y + size);
            ctx.arc(x, y + size, size / 4, -Math.PI / 2, 0);
          }
          ctx.stroke();
          ctx.restore();
        }
      }
    }
    ctx.lineCap = 'butt';
  },

  islamic(ctx, w, h, s) {
    const size = s.scale * s.density;
    const pad = size * 3;
    const n = Math.max(5, s.complexity + 3);
    ctx.strokeStyle = s.strokeColor;
    ctx.lineWidth = s.strokeWidth;

    for (let y = -pad; y < h + pad; y += size * 1.2) {
      for (let x = -pad; x < w + pad; x += size * 1.2) {
        const rowIdx = Math.round(y / (size * 1.2));
        const offset = (rowIdx % 2) * size * 0.6;
        drawStar(ctx, x + offset, y, size / 2, n, s);
      }
    }

    // Connecting lines for complexity
    if (s.complexity > 3) {
      ctx.save();
      ctx.strokeStyle = s.accentColor;
      ctx.lineWidth = s.strokeWidth * 0.4;
      ctx.globalAlpha = 0.4;
      for (let y = -pad; y < h + pad; y += size * 1.2) {
        for (let x = -pad; x < w + pad; x += size * 1.2) {
          const rowIdx = Math.round(y / (size * 1.2));
          const offset = (rowIdx % 2) * size * 0.6;
          const cx = x + offset;
          const cy = y;
          for (let i = 0; i < n; i++) {
            const a = (i / n) * Math.PI * 2 - Math.PI / 2;
            const ex = cx + Math.cos(a) * size * 0.8;
            const ey = cy + Math.sin(a) * size * 0.8;
            ctx.beginPath();
            ctx.moveTo(cx + Math.cos(a) * size / 2, cy + Math.sin(a) * size / 2);
            ctx.lineTo(ex, ey);
            ctx.stroke();
          }
        }
      }
      ctx.restore();
    }
  },

  wave(ctx, w, h, s) {
    const size = s.scale * s.density;
    const amp = size * 0.6;
    const freq = s.density * 0.05;
    const layers = Math.max(2, s.complexity);
    const pad = size * 2;
    ctx.lineCap = 'round';

    for (let layer = 0; layer < layers; layer++) {
      const t = layer / layers;
      ctx.strokeStyle = layer % 2 === 0 ? s.strokeColor : s.accentColor;
      ctx.lineWidth = s.strokeWidth * (1 - t * 0.5);
      ctx.globalAlpha = state.opacity * (1 - t * 0.4);

      for (let y = -pad; y < h + pad; y += size) {
        ctx.beginPath();
        for (let x = -pad; x <= w + pad; x += 2) {
          const wave = Math.sin((x + layer * 40) * freq + layer * 1.5) * amp;
          const wave2 = Math.sin((x + layer * 20) * freq * 2) * amp * 0.3;
          if (x === -pad) ctx.moveTo(x, y + wave + wave2);
          else ctx.lineTo(x, y + wave + wave2);
        }
        ctx.stroke();
      }
    }
    ctx.lineCap = 'butt';
  },

  circles(ctx, w, h, s) {
    const size = s.scale * s.density;
    const pad = size * 2;
    const rings = Math.max(1, s.complexity);
    ctx.strokeStyle = s.strokeColor;
    ctx.lineWidth = s.strokeWidth;

    for (let y = -pad; y < h + pad; y += size) {
      for (let x = -pad; x < w + pad; x += size) {
        const rowIdx = Math.round(y / size);
        const offset = (rowIdx % 2) * size / 2;

        for (let r = 0; r < rings; r++) {
          const radius = (size / 2) * ((r + 1) / rings);
          const alpha = 1 - (r / rings) * 0.6;
          ctx.beginPath();
          ctx.arc(x + offset, y, radius, 0, Math.PI * 2);

          if (s.fillMode !== 'stroke' && r === rings - 1) {
            ctx.fillStyle = s.fillColor + Math.round(alpha * 80).toString(16).padStart(2, '0');
            ctx.fill();
          }
          if (s.fillMode !== 'fill') {
            ctx.strokeStyle = r === 0 ? s.strokeColor : s.accentColor;
            ctx.globalAlpha = state.opacity * alpha;
            ctx.stroke();
          }
        }
      }
    }
  },

  chevron(ctx, w, h, s) {
    const size = s.scale * s.density;
    const pad = size * 3;
    const layers = Math.max(1, Math.min(s.complexity, 5));
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    for (let layer = 0; layer < layers; layer++) {
      ctx.strokeStyle = layer % 2 === 0 ? s.strokeColor : s.accentColor;
      ctx.lineWidth = s.strokeWidth * (1 - layer * 0.15);
      const layerOffset = layer * size * 0.2;

      for (let y = -pad; y < h + pad; y += size) {
        for (let x = -pad; x < w + pad; x += size) {
          ctx.beginPath();
          ctx.moveTo(x + layerOffset, y + size * 0.5);
          ctx.lineTo(x + size / 2 + layerOffset, y);
          ctx.lineTo(x + size + layerOffset, y + size * 0.5);
          if (s.fillMode !== 'stroke') {
            ctx.lineTo(x + size + layerOffset, y + size * 0.7);
            ctx.lineTo(x + size / 2 + layerOffset, y + size * 0.2);
            ctx.lineTo(x + layerOffset, y + size * 0.7);
            ctx.closePath();
            ctx.fillStyle = s.fillColor + (layer === 0 ? 'AA' : '44');
            ctx.fill();
          }
          if (s.fillMode !== 'fill') ctx.stroke();
        }
      }
    }
    ctx.lineCap = 'butt';
    ctx.lineJoin = 'miter';
  },

  crosshatch(ctx, w, h, s) {
    const size = s.scale * s.density;
    const pad = size * 3;
    const diag = Math.sqrt(w * w + h * h) + pad * 2;
    const angles = [];
    const baseAngles = [0, 90];
    if (s.complexity > 2) baseAngles.push(45, 135);
    if (s.complexity > 5) baseAngles.push(30, 60, 120, 150);

    baseAngles.forEach((a, i) => {
      ctx.strokeStyle = i < 2 ? s.strokeColor : s.accentColor;
      ctx.lineWidth = s.strokeWidth * (i < 2 ? 1 : 0.6);
      ctx.globalAlpha = state.opacity * (i < 2 ? 1 : 0.5);

      ctx.save();
      ctx.translate(w / 2, h / 2);
      ctx.rotate(a * Math.PI / 180);
      ctx.translate(-w / 2, -h / 2);

      for (let i = -diag; i < diag; i += size) {
        ctx.beginPath();
        ctx.moveTo(i, -diag);
        ctx.lineTo(i, diag);
        ctx.stroke();
      }
      ctx.restore();
    });
  },

  voronoi(ctx, w, h, s) {
    const size = s.scale * s.density;
    const rng = seededRandom(s.seed);
    const numPoints = Math.max(10, Math.min(200, Math.round((w * h) / (size * size) * 0.5)));

    // Generate points
    const points = [];
    for (let i = 0; i < numPoints; i++) {
      points.push({ x: rng() * w, y: rng() * h });
    }

    // Draw approximate Voronoi via nearest-neighbor pixel stepping (fast approach)
    // Instead, draw Delaunay-like connections
    ctx.strokeStyle = s.strokeColor;
    ctx.lineWidth = s.strokeWidth;

    // Connect nearby points
    const threshold = size * 2.5;
    for (let i = 0; i < points.length; i++) {
      for (let j = i + 1; j < points.length; j++) {
        const dx = points[i].x - points[j].x;
        const dy = points[i].y - points[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < threshold) {
          ctx.beginPath();
          ctx.moveTo(points[i].x, points[i].y);
          ctx.lineTo(points[j].x, points[j].y);
          ctx.globalAlpha = state.opacity * (1 - dist / threshold);
          ctx.stroke();
        }
      }
    }

    // Draw cell centers
    if (s.fillMode !== 'stroke') {
      points.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, s.strokeWidth * 2, 0, Math.PI * 2);
        ctx.fillStyle = s.fillColor;
        ctx.globalAlpha = state.opacity;
        ctx.fill();
      });
    }

    // Draw accent dots at midpoints for complexity
    if (s.complexity > 4) {
      ctx.fillStyle = s.accentColor;
      for (let i = 0; i < points.length; i++) {
        for (let j = i + 1; j < points.length; j++) {
          const dx = points[i].x - points[j].x;
          const dy = points[i].y - points[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < threshold * 0.7) {
            ctx.beginPath();
            ctx.arc((points[i].x + points[j].x) / 2, (points[i].y + points[j].y) / 2, 1.5, 0, Math.PI * 2);
            ctx.globalAlpha = state.opacity * 0.6;
            ctx.fill();
          }
        }
      }
    }
  },

  stars(ctx, w, h, s) {
    const size = s.scale * s.density;
    const pad = size * 2;
    const points = Math.max(4, s.complexity + 2);
    const rng = seededRandom(s.seed);
    ctx.strokeStyle = s.strokeColor;
    ctx.lineWidth = s.strokeWidth;

    for (let y = -pad; y < h + pad; y += size * 1.2) {
      for (let x = -pad; x < w + pad; x += size * 1.2) {
        const rowIdx = Math.round(y / (size * 1.2));
        const offset = (rowIdx % 2) * size * 0.6;
        const cx = x + offset;
        const cy = y;
        const innerR = size * 0.2;
        const outerR = size * 0.5;
        const rot = rng() * Math.PI * 2;

        ctx.beginPath();
        for (let i = 0; i < points * 2; i++) {
          const a = (i / (points * 2)) * Math.PI * 2 + rot;
          const r = i % 2 === 0 ? outerR : innerR;
          const px = cx + Math.cos(a) * r;
          const py = cy + Math.sin(a) * r;
          if (i === 0) ctx.moveTo(px, py);
          else ctx.lineTo(px, py);
        }
        ctx.closePath();
        if (s.fillMode !== 'stroke') {
          ctx.fillStyle = rng() > 0.5 ? s.fillColor : s.fillColor + '66';
          ctx.fill();
        }
        if (s.fillMode !== 'fill') ctx.stroke();
      }
    }
  },

  maze(ctx, w, h, s) {
    const size = s.scale * s.density;
    const rng = seededRandom(s.seed);
    const pad = size;
    ctx.strokeStyle = s.strokeColor;
    ctx.lineWidth = s.strokeWidth;
    ctx.lineCap = 'round';

    for (let y = -pad; y < h + pad; y += size) {
      for (let x = -pad; x < w + pad; x += size) {
        ctx.beginPath();
        if (rng() > 0.5) {
          ctx.moveTo(x, y);
          ctx.lineTo(x + size, y + size);
        } else {
          ctx.moveTo(x + size, y);
          ctx.lineTo(x, y + size);
        }
        ctx.stroke();

        // Extra complexity: perpendicular stubs
        if (s.complexity > 4 && rng() > 0.6) {
          ctx.save();
          ctx.strokeStyle = s.accentColor;
          ctx.lineWidth = s.strokeWidth * 0.5;
          ctx.globalAlpha = state.opacity * 0.5;
          ctx.beginPath();
          const mid = { x: x + size / 2, y: y + size / 2 };
          const angle = rng() * Math.PI * 2;
          ctx.moveTo(mid.x, mid.y);
          ctx.lineTo(mid.x + Math.cos(angle) * size * 0.3, mid.y + Math.sin(angle) * size * 0.3);
          ctx.stroke();
          ctx.restore();
        }
      }
    }
    ctx.lineCap = 'butt';
  },
};

// ============ HELPERS ============
function drawHex(ctx, cx, cy, r, s) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2 - Math.PI / 6;
    const x = cx + Math.cos(a) * r;
    const y = cy + Math.sin(a) * r;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  if (s.fillMode !== 'stroke') ctx.fill();
  if (s.fillMode !== 'fill') ctx.stroke();
}

function drawStar(ctx, cx, cy, r, n, s) {
  const inner = r * 0.4;
  ctx.beginPath();
  for (let i = 0; i < n * 2; i++) {
    const a = (i / (n * 2)) * Math.PI * 2 - Math.PI / 2;
    const rad = i % 2 === 0 ? r : inner;
    const x = cx + Math.cos(a) * rad;
    const y = cy + Math.sin(a) * rad;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  if (s.fillMode !== 'stroke') {
    ctx.fillStyle = s.fillColor + '44';
    ctx.fill();
  }
  if (s.fillMode !== 'fill') ctx.stroke();
}

// ============ EXPORT ============
function generateSVGTile() {
  const size = Math.round(state.scale * state.density);
  // Create an offscreen canvas for one tile
  const offCanvas = document.createElement('canvas');
  offCanvas.width = size;
  offCanvas.height = size;
  const offCtx = offCanvas.getContext('2d');

  // Render one tile
  offCtx.fillStyle = state.bgColor;
  offCtx.fillRect(0, 0, size, size);

  // Create a mini-state centered on the tile
  const miniState = { ...state };
  const drawFn = PATTERN_RENDERERS[state.patternType];
  if (drawFn) {
    offCtx.globalAlpha = state.opacity;
    drawFn(offCtx, size, size, miniState);
  }

  return { canvas: offCanvas, size };
}

function exportSVG() {
  const { canvas: tile, size } = generateSVGTile();
  const dataURL = tile.toDataURL('image/png');

  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <defs>
    <pattern id="tilePattern" x="0" y="0" width="${size}" height="${size}" patternUnits="userSpaceOnUse">
      <image href="${dataURL}" width="${size}" height="${size}"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#tilePattern)"/>
</svg>`;

  document.getElementById('modalTitle').textContent = 'Export SVG';
  document.getElementById('exportCode').value = svg;
  document.getElementById('exportModal').classList.add('show');
}

function exportCSS() {
  const { canvas: tile, size } = generateSVGTile();
  const dataURL = tile.toDataURL('image/png');

  const css = `background-color: ${state.bgColor};
background-image: url("${dataURL}");
background-size: ${size}px ${size}px;
background-repeat: repeat;`;

  document.getElementById('modalTitle').textContent = 'CSS Background';
  document.getElementById('exportCode').value = css;
  document.getElementById('exportModal').classList.add('show');
}

function exportPNG() {
  const link = document.createElement('a');
  link.download = `pattern-${state.patternType}-${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function closeModal() {
  document.getElementById('exportModal').classList.remove('show');
}

function copyExport() {
  const textarea = document.getElementById('exportCode');
  textarea.select();
  navigator.clipboard.writeText(textarea.value).then(() => {
    const btn = document.querySelector('.modal-actions .btn-primary');
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

// Close modal on overlay click
document.getElementById('exportModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// ============ START ============
init();
</script>
